name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff==0.15.22
      - name: ruff check
        run: ruff check .

  dag-integrity:
    name: DAG-integrity (pytest in runtime image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Building the image also validates that requirements.txt resolves on the
      # runtime's Python (3.14). Tests then run against the exact deployed image.
      - name: Build Astro runtime image
        run: docker build -t openaq-airflow:ci .
      - name: Run DAG-integrity tests inside the image
        run: docker run --rm openaq-airflow:ci python -m pytest tests -v
